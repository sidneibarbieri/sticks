# Campaign Registry - Registro de campanhas baseline executáveis
# Este arquivo documenta as campanhas disponíveis para execução local
# e sua classificação metodológica (faithful/adapted/inspired)

# Formato:
#   campaign_id: identificador único da campanha
#   name: nome descritivo
#   runner: script de execução
#   techniques: lista de técnicas MITRE ATT&CK
#   classification: faithful | adapted | inspired
#   justification: justificativa curta da classificação

campaigns:
  0.c0011:
    name: "C0011 - Transparent Tribe Education Campaign"
    runner: "campaign_runner.py"
    technique_count: 8
    techniques:
      - T1608.001  # Upload Malware
      - T1566.002  # Spearphishing Link
      - T1204.001  # Malicious Link
      - T1204.002  # Malicious File
      - T1566.001  # Spearphishing Attachment
      - T1059.005  # Visual Basic
      - T1583.001  # Domains
      - T1587.003  # Digital Certificates
    classification: "adapted"
    justification: |
      Execução em ambiente Linux de técnicas documentadas para Windows.
      T1059.005 (VB) e técnicas de phishing são simuladas via criação de
      arquivos de artefato, não execução real de código. T1587.003 usa
      openssl para gerar certificado self-signed, não CA real.
    execution_mode: "local_deterministic"
    status: "validated"
    evidence_location: "sticks/data/campaign_evidence/"

  0.pikabot_distribution_february_2024:
    name: "Pikabot Distribution February 2024 Campaign"
    runner: "campaign_runner_0pikabot.py"
    technique_count: 4
    techniques:
      - T1574      # Hijack Execution Flow
      - T1059.007  # JavaScript
      - T1059.001  # PowerShell
      - T1566.002  # Spearphishing Link
    classification: "adapted"
    justification: |
      Técnicas Windows (PowerShell, JavaScript Windows-based, DLL hijacking)
      executadas em Linux via simulação de arquivo. T1574 c arquivo .dll
      simulado, não PE real. T1059.001 gera .ps1 sem execução PowerShell.
    execution_mode: "local_deterministic"
    status: "validated"
    evidence_location: "sticks/data/campaign_evidence/"

# Classificações:
#   faithful: Execução idêntica ou equivalente ao comportamento real documentado
#   adapted:  Execução modificada para ambiente diferente (Linux vs Windows)
#   inspired: Simulação superficial que captura apenas intenção, não mecanismo

# Nota metodológica:
# Todas as campanhas atuais são 'adapted' porque executam em Linux
# técnicas documentadas para Windows. Isso é honesto e documentado.
# O objetivo não é reconstrução forense literal, mas verificação de que
# passos derivados de CTI formam comportamentos coerentes e executáveis.
