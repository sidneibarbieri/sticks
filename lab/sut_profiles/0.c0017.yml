# =============================================================================
# SUT Profile: 0.c0017 (Social Delivery Inspired)
# =============================================================================

campaign_id: "0.c0017"
description: "Minimal Linux SUT for social-delivery inspired artifact generation"

requirements:
  min_hosts: 3
  required_vms: ["caldera", "attacker", "target-base"]
  estimated_duration_minutes: 5

sut_configuration:
  target-base:
    os: "ubuntu-2204"
    role: "delivery_target"

    services:
      - name: "ssh"
        version: "default"
        config: "password_auth_enabled"

    users:
      - username: "testuser"
        password: "password123"
        sudo: false
        home_files: true

    files:
      - path: "/tmp/phishing_context.txt"
        content: "Simulated delivery context for inspired workflow"
        owner: "testuser"
        permissions: "644"

    network:
      ingress: [22]
      egress: ["*"]

fidelity_expectations:
  T1583.001: "INSPIRED"
  T1566.002: "INSPIRED"
  T1204.001: "INSPIRED"
  T1566.001: "INSPIRED"
  T1204.002: "INSPIRED"

methodology_notes: |
  This profile intentionally captures social-delivery intent as inspired-only
  artifacts in controlled Linux substrate.

execution_mode: "naive_simulated"
