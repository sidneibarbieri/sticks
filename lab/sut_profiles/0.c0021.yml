# =============================================================================
# SUT Profile: 0.c0021 (Inspired minimal profile)
# =============================================================================

campaign_id: "0.c0021"
description: "Minimal Linux SUT for phishing-to-execution inspired workflow"

requirements:
  min_hosts: 3
  required_vms: ["caldera", "attacker", "target-base"]
  estimated_duration_minutes: 6

sut_configuration:
  target-base:
    os: "ubuntu-2204"

    services:
      - name: "ssh"
        version: "default"
        config: "password_auth_enabled"
      - name: "apache2"
        version: "2.4"
        config: "cgi_enabled_vulnerable"

    users:
      - username: "victim"
        password: "victim123"
        sudo: false
        home_files: true

    files:
      - path: "/home/victim/inbox/phish_link.txt"
        content: "https://example-education-portal.test/update"
        owner: "victim"
        permissions: "644"
      - path: "/home/victim/scripts/bootstrap.sh"
        content: "#!/bin/bash\necho bootstrap\n"
        owner: "victim"
        permissions: "755"

    network:
      ingress: [22, 80]
      egress: ["*"]

    deliberate_weaknesses:
      - type: "user_interaction_prone"
        description: "T1204.001 - simulated user link access pathway"
      - type: "weak_credentials"
        description: "Controlled account for execution validation"
      - type: "vulnerable_apache_configuration"
        description: "T1190 - controlled exploit path on public-facing service"

deliberate_weaknesses_global: []

fidelity_expectations:
  T1583.001: "INSPIRED"
  T1566.002: "INSPIRED"
  T1204.001: "INSPIRED"
  T1059.001: "INSPIRED"
  T1190: "ADAPTED"
  T1059.003: "ADAPTED"

methodology_notes: |
  This profile intentionally keeps phishing and PowerShell stages as inspired,
  while validating real shell execution in Linux.

execution_mode: "real_controlled"
