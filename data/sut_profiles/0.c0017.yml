sut_configuration:
  target-base:
    os: "ubuntu-2204"
    role: "delivery_target"

    services:
      - name: "ssh"
        version: "default"
        config: "password_auth_enabled"

    users:
      - username: "testuser"
        password: "password123"
        sudo: false
        home_files: true

    files:
      - path: "/tmp/phishing_context.txt"
        content: "Simulated delivery context for inspired workflow"
        owner: "testuser"
        permissions: "644"

    network:
      ingress: [22]
      egress: ["*"]

    deliberate_weaknesses:
      - type: "weak_credentials"
        username: "testuser"
        password: "password123"
        description: "Enables reproducible SSH authentication for post-compromise chain"

