  T1083: "ADAPTED"
  T1053: "ADAPTED"
  T1543: "ADAPTED"
  T1027: "ADAPTED"
  T1564: "ADAPTED"

methodology_notes: |
  Profile aligned with the published 0.c0017 Linux technique chain.
  It preserves deterministic execution in a controlled substrate while
  keeping technique-level fidelity expectations explicit.

