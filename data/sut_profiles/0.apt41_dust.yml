methodology_notes: |
  APT41 DUST remains a controlled Linux adaptation of the published campaign.
  Reconnaissance, external account compromise, and web-service C2 stay
  inspired because they depend on infrastructure that the lab does not claim
  to reproduce. Post-compromise persistence, collection, staging, encryption,
  transfer, and exfiltration execute over bounded local artifacts with
  auditable evidence.

execution_mode: "real_controlled"
