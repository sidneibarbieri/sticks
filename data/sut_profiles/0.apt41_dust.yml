campaign_id: "0.apt41_dust"
description: "Linux multi-service SUT for APT41 DUST: dual espionage and financial operations"

requirements:
  min_hosts: 3
  required_vms: ["caldera", "attacker", "target-base"]
  estimated_duration_minutes: 15

sut_configuration:
  target-base:
    os: "ubuntu-2204"
    role: "espionage_target"

    services:
      - name: "ssh"
        version: "default"
        config: "password_auth_enabled"
      - name: "apache2"
        version: "default"
        config: "default_site_enabled"
      - name: "mysql"
        version: "default"
        config: "default_instance_exposed"

    users:
      - username: "dustops"
        password: "Dust2024!"
        sudo: true
        home_files: true

    files:
      - path: "/home/dustops/intel/targets.txt"
        content: "Controlled intelligence collection seed for APT41 DUST."
        owner: "dustops"
        permissions: "640"
      - path: "/home/dustops/intel/financials.csv"
        content: "entity,amount,date\nAlpha Corp,125000,2024-01-15\nBeta Ltd,87500,2024-02-03"
        owner: "dustops"
        permissions: "640"
      - path: "/tmp/staged_payload.sh"
        content: "#!/bin/bash\necho sticks_apt41_dust_marker"
        owner: "dustops"
        permissions: "644"

    network:
      ingress: [22, 80, 443, 3306]
      egress: ["*"]

    deliberate_weaknesses:
      - type: "weak_credentials"
        username: "dustops"
        password: "Dust2024!"
        description: "Enables reproducible SSH access for the espionage/financial chain"
      - type: "writable_directory"
        path: "/var/www/html"
        description: "Writable web root supports staging and C2 simulation"
      - type: "sudo_misconfiguration"
        description: "Adapted privilege surface for bounded post-exploitation steps"

