# Campaign: 0.c0021 — Refined inspired profile
# Source: MITRE ATT&CK Campaign C0021

campaign_id: "0.c0021"
name: "C0021 - Phishing to Scripted Execution (Inspired)"
description: >
  Minimal inspired chain for infrastructure preparation, spearphishing link,
  user execution, and scripted command execution in Linux substrate.
sut_profile_id: "0.c0021"
objective: "Validate phishing-driven initial execution workflow with explicit fidelity bounds"

steps:
  - technique_id: "T1583.001"
    technique_name: "Acquire Infrastructure: Domains"
    order: 1
    requires: ["resources:staging_directory"]
    produces: ["resources:domain_registered"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Infrastructure acquisition represented by artifact, not real domain registration.

  - technique_id: "T1566.002"
    technique_name: "Phishing: Spearphishing Link"
    order: 2
    requires: ["resources:staging_directory"]
    produces: ["artifacts:spearphish_link"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Link artifact and email context generated locally; no SMTP delivery.

  - technique_id: "T1204.001"
    technique_name: "User Execution: Malicious Link"
    order: 3
    requires: ["artifacts:spearphish_link"]
    produces: ["access:initial"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Simulated user-click event captured in artifacts; no human/browser process.

  - technique_id: "T1059.001"
    technique_name: "Command and Scripting Interpreter: PowerShell"
    order: 4
    requires: ["resources:staging_directory"]
    produces: ["execution:command"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Platform mismatch on Linux substrate; represented as script artifact only.

  - technique_id: "T1190"
    technique_name: "Exploit Public-Facing Application"
    order: 5
    requires: ["network:http_available"]
    produces: ["access:initial"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real HTTP exploit interaction against controlled vulnerable service to
      establish initial access marker in lab context.

  - technique_id: "T1059.003"
    technique_name: "Command and Scripting Interpreter: Unix Shell"
    order: 6
    requires: ["access:initial"]
    produces: ["execution:command"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real command execution on Linux shell in controlled environment.
