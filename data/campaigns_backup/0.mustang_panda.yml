# Campaign: 0.mustang_panda — Mustang Panda (G0129) RedDelta Chain (Adapted/Inspired)
# Source: MITRE ATT&CK Group G0129 (Mustang Panda), Campaign C0047 (RedDelta)
# Techniques derived from STIX relationships in 0.reddelta_modified_plugx_infection_chain_operations.yml
# Subset: Phishing→Loader→PlugX→Discovery→Exfil (10 techniques for lab reproducibility)

campaign_id: "0.mustang_panda"
name: "Mustang Panda (G0129) - RedDelta Chain (Adapted/Inspired)"
description: >
  Adapted representation of Mustang Panda (G0129) RedDelta (C0047) infection chain.
  Focuses on phishing delivery, malware upload, DLL persistence, discovery,
  and exfiltration. Fidelity: Adapted where possible, inspired for Windows-specific.
sut_profile_id: "0.mustang_panda"
objective: "Demonstrate reproducible Mustang Panda RedDelta chain with explicit fidelity"

steps:
  - technique_id: "T1566.001"
    technique_name: "Phishing: Spearphishing Attachment"
    order: 1
    requires: ["resources:staging_directory"]
    produces: ["email:delivered", "attachment:present", "tracking:enabled"]
    expected_fidelity: "adapted"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Realistic SMTP simulation with attachment obfuscation and tracking mechanisms.

  - technique_id: "T1204.001"
    technique_name: "User Execution: Malicious Link"
    order: 2
    requires: ["email:delivered", "attachment:present"]
    produces: ["user:compromised", "code:executed", "browser:exploited"]
    expected_fidelity: "adapted"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Realistic browser simulation with security bypasses and exploitation mechanisms.

  - technique_id: "T1059.001"
    technique_name: "Command and Scripting Interpreter: PowerShell"
    order: 3
    requires: ["resources:staging_directory"]
    produces: ["code_execution"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      PowerShell simulated on Linux; represents scripting in infection chain.

  - technique_id: "T1608.001"
    technique_name: "Stage Capabilities: Upload Malware"
    order: 4
    requires: ["code_execution"]
    produces: ["malware:uploaded"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real malware upload/download in lab-controlled transfer.

  - technique_id: "T1574"
    technique_name: "Hijack Execution Flow"
    order: 5
    requires: ["malware:uploaded"]
    produces: ["persistence:hijacked"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Execution flow hijack simulated; represents PlugX persistence mechanisms.

  - technique_id: "T1083"
    technique_name: "File and Directory Discovery"
    order: 6
    requires: ["persistence:hijacked"]
    produces: ["discovery:file_listing"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Discover files and directories on compromised system for data collection.

  - technique_id: "T1560.001"
    technique_name: "Archive Collected Data: Archive via Utility"
    order: 7
    requires: ["discovery:file_listing"]
    produces: ["collection:archive"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Archive collected data for exfiltration using standard compression utilities.

  - technique_id: "T1041"
    technique_name: "Exfiltration Over C2 Channel"
    order: 8
    requires: ["collection:archive"]
    produces: ["exfiltrated_data"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real exfiltration with realistic data transfer metrics.
