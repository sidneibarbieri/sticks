# Campaign: 0.c0010 — Refined inspired profile
# Source: MITRE ATT&CK Campaign C0010

campaign_id: "0.c0010"
name: "C0010 - Infrastructure + Exploit Staging (Inspired)"
description: >
  Minimal inspired profile derived from C0010, focusing on infrastructure
  preparation, payload staging, and exploit public-facing application.
sut_profile_id: "0.c0010"
objective: "Prepare infrastructure and simulate exploit-driven foothold"

steps:
  - technique_id: "T1583.001"
    technique_name: "Acquire Infrastructure: Domains"
    order: 1
    requires: ["resources:staging_directory"]
    produces: ["resources:domain_registered"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Domain acquisition represented via local artifact; no registrar/DNS control.

  - technique_id: "T1608.001"
    technique_name: "Stage Capabilities: Upload Malware"
    order: 2
    requires: ["resources:staging_directory"]
    produces: ["resources:payload_prepared"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real payload file staging in controlled lab, using benign placeholder content.

  - technique_id: "T1190"
    technique_name: "Exploit Public-Facing Application"
    order: 3
    requires: ["network:http_available"]
    produces: ["access:initial"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real HTTP interaction against intentionally vulnerable Apache configuration,
      with controlled exploit simulation and observable server artifacts.

  - technique_id: "T1059.003"
    technique_name: "Command and Scripting Interpreter: Unix Shell"
    order: 4
    requires: ["access:initial"]
    produces: ["execution:command"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Commands executed on Linux shell in controlled target host environment.
