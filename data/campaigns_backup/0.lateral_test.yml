# Campaign: 0.lateral_test — Multi-Host Lateral Movement
# Demonstrates SSH-based lateral movement between two Linux targets.
# Kill chain: Initial Access → Discovery → Lateral Movement → Collection → Exfiltration

campaign_id: "0.lateral_test"
name: "Multi-Host Lateral Movement Test"
description: >
  Demonstrates lateral movement via SSH pivoting across two Linux targets.
  Attacker compromises target-1 with weak credentials, discovers SSH key,
  uses it to pivot to target-2, then collects and exfiltrates data.
sut_profile_id: "0.lateral_test"
objective: "Pivot from initial compromise to secondary target and exfiltrate data"

steps:
  - technique_id: "T1078.001"
    technique_name: "Valid Accounts: Default Accounts"
    order: 1
    requires: ["network:ssh_available"]
    produces: ["access:initial"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      SSH login with deliberately weak credentials. Real authentication
      occurs, but credentials are pre-configured rather than discovered
      through reconnaissance.

  - technique_id: "T1059.003"
    technique_name: "Command and Scripting Interpreter: Unix Shell"
    order: 2
    requires: ["access:initial"]
    produces: ["code_execution"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real shell execution via SSH. Commands run on actual Linux target.

  - technique_id: "T1083"
    technique_name: "File and Directory Discovery"
    order: 3
    requires: ["code_execution"]
    produces: ["discovery:file_listing"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real file enumeration on target filesystem. Discovers SSH keys
      and sensitive files placed by SUT profile.

  - technique_id: "T1021.004"
    technique_name: "Remote Services: SSH"
    order: 4
    requires: ["access:initial", "network:ssh_available"]
    produces: ["access:lateral"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real SSH connection from target-1 to target-2 using discovered key.
      Core concept (SSH as lateral movement vector) preserved. Key is
      pre-staged by SUT rather than stolen from compromised host.

  - technique_id: "T1560.001"
    technique_name: "Archive Collected Data: Archive via Utility"
    order: 5
    requires: ["access:lateral"]
    produces: ["collection:archive"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real tar/gzip archive created on target-2. Actual file compression
      of sensitive data discovered on the lateral target.

  - technique_id: "T1041"
    technique_name: "Exfiltration Over C2 Channel"
    order: 6
    requires: ["collection:archive"]
    produces: ["exfiltration:complete"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Data transferred back to attacker via SSH/SCP. Uses same channel
      as lateral movement. Real file transfer occurs.
