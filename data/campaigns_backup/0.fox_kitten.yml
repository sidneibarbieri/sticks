# Campaign: 0.fox_kitten — Fox Kitten (G0117) Minimal Profile (Adapted/Inspired)
# Source: MITRE ATT&CK Group G0117 (Fox Kitten), aligned with "Kitten or Panda?" paper
# Techniques derived from STIX relationships and legacy fox-kitten.json

campaign_id: "0.fox_kitten"
name: "Fox Kitten (G0117) - Adapted/Inspired Profile"
description: >
  Adapted representation of Fox Kitten (G0117) behaviors for lab reproducibility.
  Includes initial access, defense evasion, execution, persistence, discovery,
  lateral movement, command-and-control, exfiltration, and cleanup.
  Fidelity: Adapted where possible, inspired where platform/substrate differs.
sut_profile_id: "0.fox_kitten"
objective: "Demonstrate reproducible Fox Kitten attack chain with explicit fidelity declarations"

steps:
  - technique_id: "T1190"
    technique_name: "Exploit Public-Facing Application"
    order: 1
    requires: ["network:http_available"]
    produces: ["access:initial"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real controlled exploit against intentionally vulnerable web application in lab environment.

  - technique_id: "T1078.001"
    technique_name: "Valid Accounts: Local Accounts"
    order: 2
    requires: ["access:initial"]
    produces: ["access:credentialed"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Use of pre-staged weak credentials in lab context, mimicking credential abuse.

  - technique_id: "T1059.001"
    technique_name: "Command and Scripting Interpreter: PowerShell"
    order: 3
    requires: ["access:credentialed"]
    produces: ["code_execution"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      PowerShell not native to Linux lab substrate; simulated command execution.

  - technique_id: "T1505"
    technique_name: "Server Software Component"
    order: 4
    requires: ["code_execution"]
    produces: ["persistence:webshell"]
    expected_fidelity: "inspired"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Webshell deployment simulated in lab environment due to platform constraints.

  - technique_id: "T1087"
    technique_name: "Account Discovery"
    order: 5
    requires: ["code_execution"]
    produces: ["discovery:accounts"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real enumeration of system accounts in Linux target.

  - technique_id: "T1016"
    technique_name: "System Network Configuration Discovery"
    order: 6
    requires: ["code_execution"]
    produces: ["discovery:network_config"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real network configuration enumeration via standard Linux tools.

  - technique_id: "T1046"
    technique_name: "Network Service Discovery"
    order: 7
    requires: ["code_execution"]
    produces: ["discovery:services"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real port scanning and service enumeration in lab network.

  - technique_id: "T1021.004"
    technique_name: "Remote Services: SSH"
    order: 8
    requires: ["access:credentialed"]
    produces: ["lateral_movement:ssh"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real SSH pivoting with pre-staged keys in multi-host lab topology.

  - technique_id: "T1071.001"
    technique_name: "Application Layer Protocol: Web Protocols"
    order: 9
    requires: ["lateral_movement:ssh"]
    produces: ["c2:web_protocol"]
    expected_fidelity: "inspired"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Web protocol C2 simulated in lab environment due to platform constraints.

  - technique_id: "T1090"
    technique_name: "Proxy"
    order: 10
    requires: ["c2:web_protocol"]
    produces: ["c2:proxied"]
    expected_fidelity: "inspired"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Proxy setup simulated in lab environment due to platform constraints.

  - technique_id: "T1083"
    technique_name: "File and Directory Discovery"
    order: 11
    requires: ["discovery:accounts", "discovery:network_config"]
    produces: ["discovery:file_listing"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Discover files and directories on compromised system for data collection.

  - technique_id: "T1560.001"
    technique_name: "Archive Collected Data: Archive via Utility"
    order: 12
    requires: ["discovery:file_listing"]
    produces: ["collection:archive"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Archive collected data for exfiltration using standard compression utilities.

  - technique_id: "T1041"
    technique_name: "Exfiltration Over C2 Channel"
    order: 13
    requires: ["collection:archive"]
    produces: ["exfiltration:complete"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Controlled exfiltration of collected data over established C2.

  - technique_id: "T1107"
    technique_name: "File Deletion"
    order: 14
    requires: ["exfiltration:complete"]
    produces: ["cleanup:complete"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real file cleanup to remove artifacts post-exfiltration.
