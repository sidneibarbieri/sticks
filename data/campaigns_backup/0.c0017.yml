# Campaign: 0.c0017 — Social Engineering Delivery Chain (Inspired subset)
# Source: MITRE ATT&CK Campaign C0017

campaign_id: "0.c0017"
name: "C0017 - Social Engineering Delivery (Inspired)"
description: >
  Inspired profile for social-delivery stages represented as defensive artifacts:
  domain acquisition, phishing link/attachment generation, and user-execution traces.
sut_profile_id: "0.c0017"
objective: "Capture delivery intent with explicit inspired fidelity labeling"

steps:
  - technique_id: "T1583.001"
    technique_name: "Acquire Infrastructure: Domains"
    order: 1
    requires: ["resources:staging_directory"]
    produces: ["resources:domain_registered"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Domain represented as local artifact only; no registrar/DNS control.

  - technique_id: "T1566.002"
    technique_name: "Phishing: Spearphishing Link"
    order: 2
    requires: ["resources:staging_directory"]
    produces: ["artifacts:spearphish_link"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Local URL artifact generated; no real delivery infrastructure.

  - technique_id: "T1204.001"
    technique_name: "User Execution: Malicious Link"
    order: 3
    requires: ["artifacts:spearphish_link"]
    produces: ["artifacts:malicious_link_accessed"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      User interaction represented by auditable log marker.

  - technique_id: "T1566.001"
    technique_name: "Phishing: Spearphishing Attachment"
    order: 4
    requires: ["resources:staging_directory"]
    produces: ["artifacts:spearphish_attachment"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Email and attachment represented as local files, not delivered over MTA.

  - technique_id: "T1204.002"
    technique_name: "User Execution: Malicious File"
    order: 5
    requires: ["resources:staging_directory"]
    produces: ["artifacts:malicious_file_executed"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Execution intent recorded as artifact/log; no real payload execution.
