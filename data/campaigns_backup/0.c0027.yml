# Campaign: 0.c0027 — Multi-Host Lateral Pivot (Inspired subset)
# Source: MITRE ATT&CK Campaign C0027

campaign_id: "0.c0027"
name: "C0027 - Multi-Host Lateral Pivot (Inspired)"
description: >
  Multi-host inspired profile with real controlled SSH pivot and downstream
  collection/exfiltration stages in Linux lab.
sut_profile_id: "0.c0027"
objective: "Validate reproducible SSH-based lateral movement and post-pivot data flow"

steps:
  - technique_id: "T1078.001"
    technique_name: "Valid Accounts: Default Accounts"
    order: 1
    requires: ["network:ssh_available"]
    produces: ["access:initial"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real weak-credential authentication to initial host.

  - technique_id: "T1021.004"
    technique_name: "Remote Services: SSH"
    order: 2
    requires: ["access:initial", "network:ssh_available"]
    produces: ["access:lateral"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real SSH pivot attempt with auditable evidence in multi-host topology.

  - technique_id: "T1059.003"
    technique_name: "Command and Scripting Interpreter: Unix Shell"
    order: 3
    requires: ["access:initial"]
    produces: ["code_execution"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real shell command execution for post-access operations.

  - technique_id: "T1083"
    technique_name: "File and Directory Discovery"
    order: 4
    requires: ["code_execution"]
    produces: ["discovery:file_listing"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real filesystem discovery to identify collection targets.

  - technique_id: "T1560.001"
    technique_name: "Archive Collected Data: Archive via Utility"
    order: 5
    requires: ["discovery:file_listing"]
    produces: ["collection:archive"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real archive creation from discovered files.

  - technique_id: "T1041"
    technique_name: "Exfiltration Over C2 Channel"
    order: 6
    requires: ["collection:archive"]
    produces: ["exfiltration:complete"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Controlled exfiltration with reproducible logs and artifact hashes.
