# Campaign: 0.shadowray — ShadowRay (C0045) AI/ML Infrastructure Attack
# Source: MITRE ATT&CK Campaign C0045
# Techniques derived from STIX relationships in enterprise-attack.json bundle

campaign_id: "0.shadowray"
name: "ShadowRay (C0045) - AI/ML Infrastructure Attack"
description: >
  ShadowRay exploited CVE-2023-48022 in the Ray AI framework targeting
  education, cryptocurrency, and biopharma sectors beginning late 2023.
  Attackers gained initial access via the exposed Ray Jobs API and
  deployed cryptominers and reverse shells.
sut_profile_id: "0.shadowray"
objective: "Exploit Ray AI framework to achieve persistence and resource hijacking"
mitre_id: "C0045"

steps:
  - technique_id: "T1588.002"
    technique_name: "Obtain Capabilities: Tool"
    order: 1
    requires: []
    produces: ["resources:tool_acquired"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Tool acquisition simulated via artifact file. No real download
      from external source. Intent captured (attacker prepares tools
      before exploitation) but external dependency absent in isolated SUT.

  - technique_id: "T1190"
    technique_name: "Exploit Public-Facing Application"
    order: 2
    requires: []
    produces: ["initial_access:exploitation"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real HTTP exploit against pre-configured vulnerable endpoint.
      CVE-2023-48022 Ray Jobs API path traversal simulated with
      actual HTTP request. Core mechanism preserved.

  - technique_id: "T1059.006"
    technique_name: "Command and Scripting Interpreter: Python"
    order: 3
    requires: ["initial_access:exploitation"]
    produces: ["execution:python_script"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real Python interpreter invoked with benign script on Linux.
      ShadowRay used Python to interact with Ray APIs post-exploitation.
      Mechanism fully preserved on Linux substrate.

  - technique_id: "T1546.004"
    technique_name: "Event Triggered Execution: Unix Shell Configuration Modification"
    order: 4
    requires: ["execution:python_script"]
    produces: ["persistence:shell_config"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Unix shell configuration file created in controlled /tmp location.
      Real file operation preserving persistence mechanism. System
      .bashrc not modified to prevent unintended side effects.

  - technique_id: "T1068"
    technique_name: "Exploitation for Privilege Escalation"
    order: 5
    requires: ["persistence:shell_config"]
    produces: ["privilege_escalation:root"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Privilege escalation exploit requires staged vulnerable binary
      and real CVE exploitation. Mechanism captured via artifact and
      log entry. Full exploitation not automated in isolated SUT
      without pre-staged vulnerable binary.

  - technique_id: "T1027.013"
    technique_name: "Obfuscated Files or Information: Encrypted/Encoded File"
    order: 6
    requires: []
    produces: ["defense_evasion:encoded_payload"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Base64-encoded payload artifact created. Full obfuscation
      mechanism captured but no execution of decoded payload.
      Behavioral intent preserved at artifact level.

  - technique_id: "T1003.008"
    technique_name: "OS Credential Dumping: /etc/passwd and /etc/shadow"
    order: 7
    requires: []
    produces: ["credential_access:passwd_read"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real read of /etc/passwd. World-readable file access mechanism
      fully preserved. Enumerates local accounts as attacker would.
      /etc/shadow read skipped (requires root) without loss of
      primary behavioral fidelity.

  - technique_id: "T1016"
    technique_name: "System Network Configuration Discovery"
    order: 8
    requires: []
    produces: ["discovery:network_config"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real ip route, ip addr, and resolv.conf enumeration. Mechanism
      fully preserved: attacker maps network topology post-exploitation
      to identify lateral movement targets.

  - technique_id: "T1105"
    technique_name: "Ingress Tool Transfer"
    order: 9
    requires: ["discovery:network_config"]
    produces: ["command_and_control:tool_transferred"]
    expected_fidelity: "adapted"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      curl/wget attempt to Ray dashboard endpoint (port 8265).
      HTTP-based tool retrieval mechanism preserved. External C2
      absent in isolated SUT; connection attempt documents behavioral
      intent of exploiting Ray's unauthenticated API surface.

  - technique_id: "T1496.001"
    technique_name: "Resource Hijacking: Compute Hijacking"
    order: 10
    requires: ["command_and_control:tool_transferred"]
    produces: ["impact:compute_hijacked"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      Cryptominer deployment simulated via artifact. Actual compute
      hijacking requires long-running process and real mining pool
      connectivity. Behavioral intent (monetization via stolen compute)
      captured at artifact level without real resource consumption.
