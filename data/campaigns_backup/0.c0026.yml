# Campaign: 0.c0026 — Exploit-to-Exfil Linux Chain (Inspired subset)
# Source: MITRE ATT&CK Campaign C0026

campaign_id: "0.c0026"
name: "C0026 - Exploit to Exfiltration Chain (Inspired)"
description: >
  Minimal inspired profile with real controlled execution for exploit,
  shell, discovery, archive, and exfiltration over lab channel.
sut_profile_id: "0.c0026"
objective: "Demonstrate reproducible exploit-driven data collection and exfiltration"

steps:
  - technique_id: "T1190"
    technique_name: "Exploit Public-Facing Application"
    order: 1
    requires: ["network:http_available"]
    produces: ["access:initial"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real controlled interaction with intentionally vulnerable public service.

  - technique_id: "T1059.003"
    technique_name: "Command and Scripting Interpreter: Unix Shell"
    order: 2
    requires: ["access:initial"]
    produces: ["code_execution"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real shell execution in controlled Linux target context.

  - technique_id: "T1083"
    technique_name: "File and Directory Discovery"
    order: 3
    requires: ["code_execution"]
    produces: ["discovery:file_listing"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real file enumeration over host filesystem.

  - technique_id: "T1560.001"
    technique_name: "Archive Collected Data: Archive via Utility"
    order: 4
    requires: ["discovery:file_listing"]
    produces: ["collection:archive"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real archive generation from discovered artifacts.

  - technique_id: "T1041"
    technique_name: "Exfiltration Over C2 Channel"
    order: 5
    requires: ["collection:archive"]
    produces: ["exfiltration:complete"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Controlled transfer of archive with auditable artifacts and hashes.
