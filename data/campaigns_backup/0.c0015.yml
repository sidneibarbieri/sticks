# Campaign: 0.c0015 — Credentialed Linux Post-Compromise (Inspired subset)
# Source: MITRE ATT&CK Campaign C0015

campaign_id: "0.c0015"
name: "C0015 - Credentialed Post-Compromise (Inspired)"
description: >
  Minimal inspired profile focused on credentialed access, shell execution,
  filesystem discovery, archiving, and exfiltration in controlled Linux lab.
sut_profile_id: "0.c0015"
objective: "Validate reproducible credentialed access and post-compromise data flow"

steps:
  - technique_id: "T1078.001"
    technique_name: "Valid Accounts: Default Accounts"
    order: 1
    requires: ["network:ssh_available"]
    produces: ["access:initial"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real SSH authentication with deliberately weak account in controlled SUT.

  - technique_id: "T1059.003"
    technique_name: "Command and Scripting Interpreter: Unix Shell"
    order: 2
    requires: ["access:initial"]
    produces: ["code_execution"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real shell commands executed on Linux target with benign command set.

  - technique_id: "T1083"
    technique_name: "File and Directory Discovery"
    order: 3
    requires: ["code_execution"]
    produces: ["discovery:file_listing"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real filesystem enumeration over pre-configured host surface.

  - technique_id: "T1560.001"
    technique_name: "Archive Collected Data: Archive via Utility"
    order: 4
    requires: ["discovery:file_listing"]
    produces: ["collection:archive"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real tar/gzip archive creation from discovered benign files.

  - technique_id: "T1041"
    technique_name: "Exfiltration Over C2 Channel"
    order: 5
    requires: ["collection:archive"]
    produces: ["exfiltration:complete"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Controlled archive transfer in lab channel; operationally observable.
