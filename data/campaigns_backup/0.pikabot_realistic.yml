# Campaign: 0.pikabot_realistic — Pikabot Distribution February 2024
# Source: Pikabot distribution campaign observed February 2024
# Kill chain: Resource Development → Initial Access → Execution → Persistence

campaign_id: "0.pikabot_realistic"
name: "Pikabot Distribution February 2024 - Realistic Execution"
description: >
  Pikabot malware distribution campaign using spearphishing links leading to
  JavaScript downloaders, PowerShell execution, and DLL hijacking for persistence.
  Includes realistic initial access via Apache CVE-2021-41773 path traversal.
sut_profile_id: "0.pikabot_realistic"
objective: "Distribute Pikabot payload via multi-stage delivery chain"

steps:
  - technique_id: "T1190"
    technique_name: "Exploit Public-Facing Application"
    order: 1
    requires: ["network:http_available"]
    produces: ["access:initial"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real Apache CVE-2021-41773 exploitation on vulnerable target.
      Path traversal yields actual file read and potential RCE via CGI.

  - technique_id: "T1078.001"
    technique_name: "Valid Accounts: Default Accounts"
    order: 2
    requires: ["network:ssh_available"]
    produces: ["access:authenticated"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real SSH authentication with weak credentials configured in SUT.

  - technique_id: "T1566.002"
    technique_name: "Phishing: Spearphishing Link"
    order: 3
    requires: ["resources:staging_directory"]
    produces: ["artifacts:spearphish_link"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      URL file created locally. No email delivery infrastructure.

  - technique_id: "T1059.007"
    technique_name: "Command and Scripting Interpreter: JavaScript"
    order: 4
    requires: ["resources:staging_directory"]
    produces: ["code_execution"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      PLATFORM MISMATCH. JavaScript file created for WScript/CScript.
      Linux has no Windows Script Host environment.

  - technique_id: "T1059.001"
    technique_name: "Command and Scripting Interpreter: PowerShell"
    order: 5
    requires: ["resources:staging_directory"]
    produces: ["code_execution"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      CRITICAL PLATFORM MISMATCH. PowerShell script created but not
      executed. Linux substrate lacks PowerShell runtime with Windows APIs.

  - technique_id: "T1574"
    technique_name: "Hijack Execution Flow"
    order: 6
    requires: ["resources:staging_directory"]
    produces: ["persistence", "privilege_escalation"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      CRITICAL PLATFORM MISMATCH. Fake DLL created (not PE format).
      Linux uses ELF, not PE/DLL loader.

  - technique_id: "T1059.003"
    technique_name: "Command and Scripting Interpreter: Unix Shell"
    order: 7
    requires: ["access:authenticated"]
    produces: ["code_execution"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real shell execution via SSH on Linux target.

  - technique_id: "T1083"
    technique_name: "File and Directory Discovery"
    order: 8
    requires: ["code_execution"]
    produces: ["discovery:file_listing"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real file enumeration on target filesystem.

  - technique_id: "T1560.001"
    technique_name: "Archive Collected Data: Archive via Utility"
    order: 9
    requires: ["discovery:file_listing"]
    produces: ["collection:archive"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real tar/gzip archive of discovered sensitive files.

  - technique_id: "T1041"
    technique_name: "Exfiltration Over C2 Channel"
    order: 10
    requires: ["collection:archive"]
    produces: ["exfiltration:complete"]
    expected_fidelity: "adapted"
    expected_mode: "real_controlled"
    fidelity_rationale: >
      Real HTTP POST exfiltration of archive to attacker-controlled server.

  - technique_id: "T1059.005"
    technique_name: "Command and Scripting Interpreter: Visual Basic"
    order: 11
    requires: ["resources:staging_directory"]
    produces: ["code_execution"]
    expected_fidelity: "inspired"
    expected_mode: "naive_simulated"
    fidelity_rationale: >
      CRITICAL PLATFORM MISMATCH. VBScript created but not executed.
      Linux lacks Windows Script Host.
