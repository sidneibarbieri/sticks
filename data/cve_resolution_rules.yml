rules:
  - cve: CVE-2022-38028
    vendor: Microsoft
    product: Windows Print Spooler
    resolution_kind: windows_component
    automatic_sut_support: false
    attck_binding_names:
      - Windows Print Spooler
  - cve: CVE-2023-48022
    vendor: Anyscale
    product: Ray
    resolution_kind: open_package
    automatic_sut_support: true
    ecosystem: pip
    package_name: ray
    install_channel: pip
    version_strategy: explicit_versions_from_advisory
    candidate_versions:
      - "2.6.3"
      - "2.8.0"
    overlay_template: ray_jobs_api_exposure
    overlay_summary: Expose the Ray-like Jobs API boundary before T1190.
    attck_binding_names:
      - Ray
      - ray
  - cve: CVE-2024-3400
